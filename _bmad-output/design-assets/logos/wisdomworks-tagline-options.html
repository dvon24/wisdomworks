<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>WisdomWorks — Tagline Options</title>
<style>
  body { font-family: -apple-system, system-ui, sans-serif; background: #0a0a0f; color: #e5e5e5; margin: 0; padding: 40px 20px; }
  h1 { text-align: center; font-weight: 300; letter-spacing: 2px; margin-bottom: 8px; }
  .sub { text-align: center; color: #888; font-size: 13px; margin-bottom: 40px; }
  .container { max-width: 720px; margin: 0 auto; }
  .card { background: #14141c; border: 1px solid #222; border-radius: 14px; padding: 28px; margin-bottom: 16px; }
  .card.light { background: #f5f5f0; border-color: #e5e5e0; }
  .card.deep { background: #0f1729; border-color: #1e293b; }
  .label { font-size: 10px; text-transform: uppercase; letter-spacing: 2.5px; color: #666; margin-bottom: 18px; }
  .card.light .label { color: #555; }
  .logo-area { display: flex; align-items: center; justify-content: center; min-height: 130px; }
  svg { max-width: 100%; height: auto; }
</style>
</head>
<body>

<h1>WISDOMWORKS</h1>
<div class="sub">Tagline options</div>

<div class="container">

  <!-- Option A -->
  <div class="card">
    <div class="label">A · "Because it does."</div>
    <div class="logo-area">
      <svg width="460" height="140" viewBox="0 0 460 140" xmlns="http://www.w3.org/2000/svg">
        <g transform="translate(30, 35)">
          <ellipse cx="40" cy="40" rx="38" ry="15" fill="none" stroke="#a78bfa" stroke-width="1.8" transform="rotate(-20 40 40)"/>
          <ellipse cx="40" cy="40" rx="30" ry="8" fill="none" stroke="#a78bfa" stroke-width="1.2" opacity="0.4" transform="rotate(40 40 40)"/>
          <ellipse cx="40" cy="40" rx="22" ry="5" fill="none" stroke="#a78bfa" stroke-width="1.2" opacity="0.4" transform="rotate(75 40 40)"/>
          <circle cx="40" cy="40" r="8" fill="#a78bfa"/>
          <circle cx="40" cy="40" r="12" fill="none" stroke="#a78bfa" stroke-width="1" opacity="0.5"/>
          <circle cx="74" cy="26" r="4" fill="#ede9fe"/>
          <circle cx="4" cy="54" r="4" fill="#ede9fe"/>
          <circle cx="62" cy="64" r="2.6" fill="#ede9fe" opacity="0.7"/>
        </g>
        <text x="140" y="68" font-family="-apple-system, Helvetica, sans-serif" font-size="34" font-weight="500" fill="#f0f0f0" letter-spacing="0.5">WisdomWorks</text>
        <text x="141" y="90" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#a78bfa" letter-spacing="0.5">because it does.</text>
      </svg>
    </div>
  </div>

  <!-- Option B -->
  <div class="card deep">
    <div class="label">B · "Because it works." (pun doubles down)</div>
    <div class="logo-area">
      <svg width="460" height="140" viewBox="0 0 460 140" xmlns="http://www.w3.org/2000/svg">
        <g transform="translate(30, 35)">
          <ellipse cx="40" cy="40" rx="38" ry="15" fill="none" stroke="#a78bfa" stroke-width="1.8" transform="rotate(-20 40 40)"/>
          <ellipse cx="40" cy="40" rx="30" ry="8" fill="none" stroke="#a78bfa" stroke-width="1.2" opacity="0.4" transform="rotate(40 40 40)"/>
          <ellipse cx="40" cy="40" rx="22" ry="5" fill="none" stroke="#a78bfa" stroke-width="1.2" opacity="0.4" transform="rotate(75 40 40)"/>
          <circle cx="40" cy="40" r="8" fill="#a78bfa"/>
          <circle cx="40" cy="40" r="12" fill="none" stroke="#a78bfa" stroke-width="1" opacity="0.5"/>
          <circle cx="74" cy="26" r="4" fill="#ede9fe"/>
          <circle cx="4" cy="54" r="4" fill="#ede9fe"/>
          <circle cx="62" cy="64" r="2.6" fill="#ede9fe" opacity="0.7"/>
        </g>
        <text x="140" y="68" font-family="-apple-system, Helvetica, sans-serif" font-size="34" font-weight="500" fill="#f0f0f0" letter-spacing="0.5">WisdomWorks</text>
        <text x="141" y="90" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#a78bfa" letter-spacing="0.5">because it works.</text>
      </svg>
    </div>
  </div>

  <!-- Option C -->
  <div class="card light">
    <div class="label">C · "Because it does." on light</div>
    <div class="logo-area">
      <svg width="460" height="140" viewBox="0 0 460 140" xmlns="http://www.w3.org/2000/svg">
        <g transform="translate(30, 35)">
          <ellipse cx="40" cy="40" rx="38" ry="15" fill="none" stroke="#0f172a" stroke-width="1.8" transform="rotate(-20 40 40)"/>
          <ellipse cx="40" cy="40" rx="30" ry="8" fill="none" stroke="#0f172a" stroke-width="1.2" opacity="0.35" transform="rotate(40 40 40)"/>
          <ellipse cx="40" cy="40" rx="22" ry="5" fill="none" stroke="#0f172a" stroke-width="1.2" opacity="0.35" transform="rotate(75 40 40)"/>
          <circle cx="40" cy="40" r="8" fill="#7c3aed"/>
          <circle cx="40" cy="40" r="12" fill="none" stroke="#7c3aed" stroke-width="1" opacity="0.5"/>
          <circle cx="74" cy="26" r="4" fill="#0f172a"/>
          <circle cx="4" cy="54" r="4" fill="#0f172a"/>
          <circle cx="62" cy="64" r="2.6" fill="#0f172a" opacity="0.7"/>
        </g>
        <text x="140" y="68" font-family="-apple-system, Helvetica, sans-serif" font-size="34" font-weight="600" fill="#0f172a" letter-spacing="0.5">WisdomWorks</text>
        <text x="141" y="90" font-family="Georgia, serif" font-size="13" font-style="italic" fill="#7c3aed" letter-spacing="0.5">because it does.</text>
      </svg>
    </div>
  </div>

  <!-- Option D: all caps, no italic -->
  <div class="card">
    <div class="label">D · All caps treatment</div>
    <div class="logo-area">
      <svg width="460" height="140" viewBox="0 0 460 140" xmlns="http://www.w3.org/2000/svg">
        <g transform="translate(30, 35)">
          <ellipse cx="40" cy="40" rx="38" ry="15" fill="none" stroke="#a78bfa" stroke-width="1.8" transform="rotate(-20 40 40)"/>
          <ellipse cx="40" cy="40" rx="30" ry="8" fill="none" stroke="#a78bfa" stroke-width="1.2" opacity="0.4" transform="rotate(40 40 40)"/>
          <ellipse cx="40" cy="40" rx="22" ry="5" fill="none" stroke="#a78bfa" stroke-width="1.2" opacity="0.4" transform="rotate(75 40 40)"/>
          <circle cx="40" cy="40" r="8" fill="#a78bfa"/>
          <circle cx="40" cy="40" r="12" fill="none" stroke="#a78bfa" stroke-width="1" opacity="0.5"/>
          <circle cx="74" cy="26" r="4" fill="#ede9fe"/>
          <circle cx="4" cy="54" r="4" fill="#ede9fe"/>
          <circle cx="62" cy="64" r="2.6" fill="#ede9fe" opacity="0.7"/>
        </g>
        <text x="140" y="68" font-family="-apple-system, Helvetica, sans-serif" font-size="34" font-weight="500" fill="#f0f0f0" letter-spacing="0.5">WisdomWorks</text>
        <text x="141" y="90" font-family="-apple-system, sans-serif" font-size="10" fill="#a78bfa" letter-spacing="3.5">BECAUSE IT DOES.</text>
      </svg>
    </div>
  </div>

</div>

</body>
</html>
